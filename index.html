<!DOCTYPE html>
<html>
<head>
  <title>Smart Tools Hub</title>
  <style>
    body { font-family: Arial; text-align: center; background:#f2f2f2; margin:0; }
    header { background:#111; color:white; padding:20px; }
    .box { background:white; width:300px; margin:20px auto; padding:20px; border-radius:10px; }
    input, button { padding:10px; margin:10px; width:80%; }
    button { background:#111; color:white; border:none; cursor:pointer; }
  </style>
</head>

<body>

<header>
  <h1>🔥 Smart Tools Hub</h1>
  <p>Free Online Age Calculator</p>
</header>

<div class="box">
  <h2>Age Calculator</h2>
  <input type="date" id="dob">
  <button onclick="calcAge()">Calculate</button>
  <h3 id="result"></h3>
</div>

<script>
function calcAge() {
  let dob = document.getElementById("dob").value;
  if(!dob){
    document.getElementById("result").innerHTML = "Please select date!";
    return;
  }

  let birthDate = new Date(dob);
  let today = new Date();

  let age = today.getFullYear() - birthDate.getFullYear();

  document.getElementById("result").innerHTML =
    "Your Age is: " + age + " years";
}
</script>

</body>
</html>

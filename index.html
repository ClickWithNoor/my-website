<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Tools Hub</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f2f2f2;
      text-align:center;
    }

    header{
      background:#111;
      color:white;
      padding:20px;
    }

    .box{
      background:white;
      width:320px;
      margin:20px auto;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px #ccc;
    }

    input, button{
      padding:10px;
      margin:8px;
      width:85%;
    }

    button{
      background:#111;
      color:white;
      border:none;
      cursor:pointer;
    }

    .result{
      font-weight:bold;
      margin-top:10px;
    }

  </style>
</head>

<body>

<header>
  <h1>🔥 Smart Tools Hub</h1>
  <p>All Free Online Tools in One Place</p>
</header>

<!-- AGE CALCULATOR -->
<div class="box">
  <h2>Age Calculator</h2>
  <input type="date" id="dob">
  <button onclick="ageCalc()">Calculate Age</button>
  <div class="result" id="ageResult"></div>
</div>

<!-- PERCENTAGE CALCULATOR -->
<div class="box">
  <h2>Percentage Calculator</h2>
  <input type="number" id="marks" placeholder="Obtained Marks">
  <input type="number" id="total" placeholder="Total Marks">
  <button onclick="percentCalc()">Calculate %</button>
  <div class="result" id="percentResult"></div>
</div>

<!-- BMI CALCULATOR -->
<div class="box">
  <h2>BMI Calculator</h2>
  <input type="number" id="weight" placeholder="Weight (kg)">
  <input type="number" id="height" placeholder="Height (cm)">
  <button onclick="bmiCalc()">Calculate BMI</button>
  <div class="result" id="bmiResult"></div>
</div>

<script>

function ageCalc(){
  let dob = document.getElementById("dob").value;
  if(!dob){
    document.getElementById("ageResult").innerHTML="Select date!";
    return;
  }
  let birth = new Date(dob);
  let today = new Date();
  let age = today.getFullYear() - birth.getFullYear();
  document.getElementById("ageResult").innerHTML="Age: "+age+" years";
}

function percentCalc(){
  let m = document.getElementById("marks").value;
  let t = document.getElementById("total").value;

  if(!m || !t){
    document.getElementById("percentResult").innerHTML="Enter values!";
    return;
  }

  let percent = (m/t)*100;
  document.getElementById("percentResult").innerHTML="Percentage: "+percent.toFixed(2)+"%";
}

function bmiCalc(){
  let w = document.getElementById("weight").value;
  let h = document.getElementById("height").value;

  if(!w || !h){
    document.getElementById("bmiResult").innerHTML="Enter values!";
    return;
  }

  let bmi = w / ((h/100)*(h/100));
  document.getElementById("bmiResult").innerHTML="BMI: "+bmi.toFixed(2);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tools Hub</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f4f4;
}

header{
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

header p{
  color:#ccc;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
}

.card{
  background:white;
  width:280px;
  margin:15px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px #ccc;
}

input, button{
  width:90%;
  padding:10px;
  margin:8px 0;
}

button{
  background:#111;
  color:white;
  border:none;
  cursor:pointer;
}

footer{
  text-align:center;
  background:#111;
  color:white;
  padding:15px;
  margin-top:30px;
}
</style>

</head>

<body>

<header>
  <h1>🔥 Smart Tools Hub</h1>
  <p>Free Online Tools for Everyone</p>
</header>

<div class="container">

<!-- AGE -->
<div class="card">
<h3>Age Calculator</h3>
<input type="date" id="dob">
<button onclick="age()">Calculate</button>
<h3 id="ageResult"></h3>
</div>

<!-- PERCENT -->
<div class="card">
<h3>Percentage Calculator</h3>
<input type="number" id="marks" placeholder="Obtained Marks">
<input type="number" id="total" placeholder="Total Marks">
<button onclick="percent()">Calculate</button>
<h3 id="percentResult"></h3>
</div>

<!-- BMI -->
<div class="card">
<h3>BMI Calculator</h3>
<input type="number" id="weight" placeholder="Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">
<button onclick="bmi()">Calculate</button>
<h3 id="bmiResult"></h3>
</div>

</div>

<footer>
© 2026 Smart Tools Hub | All Rights Reserved
</footer>

<script>

function age(){
let dob=document.getElementById("dob").value;
if(!dob)return;
let a=new Date().getFullYear()-new Date(dob).getFullYear();
document.getElementById("ageResult").innerText=a+" years";
}

function percent(){
let m=document.getElementById("marks").value;
let t=document.getElementById("total").value;
let p=(m/t)*100;
document.getElementById("percentResult").innerText=p.toFixed(2)+"%";
}

function bmi(){
let w=document.getElementById("weight").value;
let h=document.getElementById("height").value/100;
let b=w/(h*h);
document.getElementById("bmiResult").innerText=b.toFixed(2);
}

</script>

</body>
</html>
